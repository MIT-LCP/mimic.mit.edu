title: MIMIC
description: A large, publicly available critical care database
url: "https://mimic.mit.edu"
baseurl: ""

theme: just-the-docs

# Aux links (top-right)
aux_links:
  "GitHub":
    - "https://github.com/MIT-LCP/mimic-website"

aux_links_new_tab: true

# Footer
footer_content: "&copy; MIT Laboratory for Computational Physiology. <a href=\"https://accessibility.mit.edu/\">Accessibility</a>."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Edit this page link
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/MIT-LCP/mimic-website"
gh_edit_branch: "main"
gh_edit_view_mode: "edit"

# Enable navigation hierarchy
nav_enabled: true

# Heading anchor links
heading_anchors: true

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE
  - ISSUE_TEMPLATE.md
  - migrate.py
  - content/
  - config.toml
  - package.json
  - package-lock.json
  - archetypes/
  - resources/
  - themes/
  - assets/
  - i18n/
  - layouts/
  - bin/
  - env/

# Sass - silence deprecation warnings from the just-the-docs theme
sass:
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin
    - color-functions

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections
collections_dir: ""

# Defaults
defaults:
  - scope:
      path: "docs"
    values:
      layout: "default"
